<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Voide Client</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="bg-mesh"></div>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="cursor" id="cursor"></div>
<div class="cursor-dot" id="cursorDot"></div>

<nav class="nav glass" style="position:fixed;top:20px;left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:1200px;border-radius:16px;z-index:100;">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo" style="text-decoration:none;color:var(--text);">
      <span class="logo-v">V</span><span class="logo-rest">OIDE</span>
      <div class="logo-badge">CLIENT</div>
    </a>
  </div>
</nav>

<div class="page-body">
  <div class="auth-card glass-card">
    <div class="auth-logo">
      <div class="nav-logo" style="justify-content:center;display:flex;align-items:center;gap:6px;font-weight:800;font-size:22px;">
        <span class="logo-v">V</span><span class="logo-rest">OIDE</span>
        <div class="logo-badge">CLIENT</div>
      </div>
    </div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to access your dashboard and downloads</p>

    <div class="form-group">
      <label class="form-label">Username or Email</label>
      <input type="text" class="form-input" id="loginUser" placeholder="aggry" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="loginPass" placeholder="••••••••" autocomplete="current-password">
      <div class="form-error" id="loginError">Invalid username or password.</div>
    </div>

    <button class="btn-primary btn-full" id="loginBtn" onclick="doLogin()">
      Sign In
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>

    <p class="auth-divider" style="margin-top:20px;">
      Don't have an account? <a href="register.html">Register →</a>
    </p>
    <p class="auth-divider" style="margin-top:10px;">
      <a href="../index.html" style="color:var(--text-muted);font-size:13px;">← Back to site</a>
    </p>
  </div>
</div>

<script>
// Custom cursor
const cursor = document.getElementById('cursor');
const cursorDot = document.getElementById('cursorDot');
let mx=0,my=0,cx=0,cy=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
function animCursor(){cx+=(mx-cx)*0.18;cy+=(my-cy)*0.18;cursor.style.left=cx+'px';cursor.style.top=cy+'px';cursorDot.style.left=mx+'px';cursorDot.style.top=my+'px';requestAnimationFrame(animCursor);}
animCursor();
document.querySelectorAll('a,button,input').forEach(el=>{
  el.addEventListener('mouseenter',()=>cursor.classList.add('cursor--hover'));
  el.addEventListener('mouseleave',()=>cursor.classList.remove('cursor--hover'));
});

function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const err = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  err.classList.remove('show');
  if (!user || !pass) { err.textContent = 'Please fill in all fields.'; err.classList.add('show'); return; }
  btn.textContent = 'Signing in...';
  btn.disabled = true;
  setTimeout(() => {
    // Demo: any login works
    localStorage.setItem('voide_user', JSON.stringify({ username: user, key: 'VOID-XXXX-XXXX-XXXX', keyActive: true, joined: '2025-01-15' }));
    window.location.href = 'dashboard.html';
  }, 1200);
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
